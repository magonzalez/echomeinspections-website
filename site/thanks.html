<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thanks — EC Home Inspections</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
  :root{
    --navy:#0F2038;
    --cta:#C2410C;
    --cta-dark:#9A3412;
    --ink:#16233B;
    --ink-muted:#4A5A72;
    --orange:#F97316;
    --radius:6px;
    --font-display:'Avenir Next Condensed','Arial Narrow',-apple-system,sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:#fff;
    color:var(--ink);
    font-family:var(--font-body);
    font-size:16px;
    line-height:1.6;
  }
  h1{margin:0 0 20px;font-weight:700;}
  p{margin:0 0 1em;color:var(--ink-muted);}
  a:focus-visible,button:focus-visible{
    outline:2px solid #1E6FD9;
    outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    *{transition-duration:0.001ms !important;}
  }
  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding:0 24px;
  }
  header{background:var(--navy);}
  header .wrap{
    display:flex;
    align-items:center;
    padding-top:16px;
    padding-bottom:16px;
  }
  .brand-wordmark{height:40px;width:auto;display:block;max-width:min(320px,72vw);}
  main{
    min-height:60vh;
    display:flex;
    align-items:center;
  }
  main .wrap{
    padding-top:72px;
    padding-bottom:72px;
    text-align:center;
  }
  h1{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.01em;
    font-size:clamp(2rem, 6vw, 3rem);
    color:var(--navy);
  }
  main p{
    font-size:1.1rem;
    max-width:46ch;
    margin-left:auto;
    margin-right:auto;
    margin-bottom:30px;
  }
  .btn{
    display:inline-block;
    font-family:var(--font-body);
    font-weight:700;
    font-size:1rem;
    letter-spacing:.02em;
    text-decoration:none;
    padding:15px 32px;
    border-radius:var(--radius);
    border:1px solid transparent;
    background:var(--cta);
    color:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
    transition:background-color .15s ease;
  }
  .btn:hover{background:var(--cta-dark);}
  footer{
    background:var(--navy);
    color:#C9D6E8;
    border-top:3px solid var(--orange);
    padding:40px 0 44px;
    text-align:center;
    font-size:0.92rem;
  }
  footer .wrap > *{margin-bottom:8px;}
  footer .wrap > *:last-child{margin-bottom:0;}
  footer a{color:#7EB0F2;}
  footer .foot-brand{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.03em;
    color:#fff;
    font-size:1.1rem;
    font-weight:700;
  }
  @media (max-width:374px){
    .wrap{padding:0 16px;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <a href="/"><img class="brand-wordmark" src="assets/logo-wordmark-outlined-light.svg" alt="EC Home Inspections" width="560" height="96"></a>
  </div>
</header>

<main>
  <div class="wrap">
    <h1>Thank you!</h1>
    <p>Your message is on its way to Edna. You’ll hear back within one business day.</p>
    <a class="btn" href="/">Back to the site</a>
  </div>
</main>

<footer>
  <div class="wrap">
    <div><span class="foot-brand">EC Home Inspections</span> &middot; 10577 CR 2349, Sinton, TX</div>
    <div>(361) 558-6496 &middot; <a href="mailto:edna@echomeinspectionstx.com">edna@echomeinspectionstx.com</a></div>
    <div>Texas Real Estate Commission License #27120</div>
  </div>
</footer>

</body>
</html>
